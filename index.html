<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>WiFi Catosa — Bienvenido</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --black: #0A0A0A;
    --white: #FFFFFF;
    --gray-100: #F2F2F2;
    --gray-200: #E0E0E0;
    --gray-400: #999;
    --gray-700: #444;
    --radius: 12px;
    --radius-sm: 8px;
  }
  html, body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--gray-100);
    color: var(--black);
    -webkit-font-smoothing: antialiased;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 24px 16px 32px;
    gap: 12px;
  }

  /* ── CARD PRINCIPAL ── */
  .card {
    background: var(--white);
    border-radius: var(--radius);
    width: 100%;
    max-width: 420px;
    overflow: hidden;
    box-shadow: 0 4px 28px rgba(0,0,0,0.13);
  }

  /* HEADER */
  .card-header {
    background: var(--black);
    padding: 30px 28px 26px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }
  .header-logos {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
  }
  .logo-catosa {
    height: 36px;
    width: auto;
    object-fit: contain;
    display: block;
  }
  .logo-divider {
    width: 1px;
    height: 32px;
    background: rgba(255,255,255,0.25);
    flex-shrink: 0;
    margin: 0 22px;
  }
  .logo-intl {
    height: 36px;
    width: auto;
    object-fit: contain;
    display: block;
  }
  .wifi-badge {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    border: 1px solid rgba(255,255,255,0.22);
    border-radius: 20px;
    padding: 7px 14px;
  }
  .wifi-badge span {
    color: rgba(255,255,255,0.8);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.6px;
    text-transform: uppercase;
  }

  /* BODY */
  .card-body { padding: 28px 28px 32px; }
  .intro { font-size: 14px; color: #555; line-height: 1.6; margin-bottom: 24px; }
  .form-group { margin-bottom: 16px; }
  label {
    display: block;
    font-size: 11px; font-weight: 700;
    color: var(--gray-400);
    text-transform: uppercase; letter-spacing: 0.7px;
    margin-bottom: 7px;
  }
  input[type="text"] {
    width: 100%; height: 48px;
    border: 1.5px solid var(--gray-200);
    border-radius: var(--radius-sm);
    padding: 0 14px;
    font-size: 15px; color: var(--black);
    background: var(--white);
    transition: border-color 0.15s, box-shadow 0.15s;
    outline: none; -webkit-appearance: none;
  }
  input[type="text"]::placeholder { color: #C8C8C8; }
  input[type="text"]:focus {
    border-color: var(--black);
    box-shadow: 0 0 0 3px rgba(0,0,0,0.08);
  }
  .divider { height: 1px; background: var(--gray-200); margin: 22px 0; }
  .btn-connect {
    width: 100%; height: 52px;
    background: var(--black); color: var(--white);
    border: none; border-radius: var(--radius-sm);
    font-size: 15px; font-weight: 700; letter-spacing: 0.3px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 9px;
    transition: background 0.15s, transform 0.1s;
    -webkit-appearance: none;
  }
  .btn-connect:hover  { background: #2a2a2a; }
  .btn-connect:active { transform: scale(0.98); }
  .btn-connect:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none; flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* STATES */
  .state { display: none; }
  .state.active { display: block; }

  /* SUCCESS */
  .success-card { text-align: center; padding: 4px 0 8px; }
  .success-icon {
    width: 64px; height: 64px; background: #EDFAF4;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 18px;
  }
  .success-card h2 { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
  .success-card .sub { font-size: 14px; color: #666; line-height: 1.55; margin-bottom: 22px; }
  .wifi-creds {
    background: var(--gray-100);
    border: 1.5px solid var(--gray-200);
    border-radius: var(--radius-sm);
    overflow: hidden; margin-bottom: 12px; text-align: left;
  }
  .cred-row { display: flex; align-items: center; justify-content: space-between; padding: 13px 16px; }
  .cred-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: var(--gray-400); }
  .cred-value { font-size: 15px; font-weight: 600; color: var(--black); }
  .cred-password { font-family: 'SF Mono','Fira Code','Courier New',monospace; letter-spacing: 0.5px; }
  .cred-divider { height: 1px; background: var(--gray-200); margin: 0 16px; }
  .btn-copy {
    width: 100%; height: 44px;
    background: var(--white); color: var(--gray-700);
    border: 1.5px solid var(--gray-200); border-radius: var(--radius-sm);
    font-size: 14px; font-weight: 600; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 7px;
    transition: background 0.15s, border-color 0.15s; margin-bottom: 4px;
  }
  .btn-copy:hover { background: var(--gray-100); }
  .btn-copy.copied { color: #1A9E5C; border-color: #A8E6C8; background: #EDFAF4; }
  .hint { font-size: 12px; color: #bbb; margin-top: 16px; }

  /* ERROR */
  .error-msg {
    display: none;
    background: #FFF5F5; border: 1px solid #FFCDD2; color: #C62828;
    font-size: 13px; padding: 10px 14px;
    border-radius: var(--radius-sm); margin-top: 14px;
  }

  /* ── BANNER VALVOLINE ── */
  .promo-banner {
    width: 100%;
    max-width: 420px;
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    position: relative;
  }
  .promo-banner img {
    width: 100%;
    display: block;
  }
  .promo-label {
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    color: white;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 5px 12px;
    border-radius: 20px;
    white-space: nowrap;
  }

  /* FOOTER */
  .footer { text-align: center; font-size: 11px; color: #aaa; margin-top: 4px; }
</style>
</head>

<div class="footer">Catosa Camionera / Grupo Amher &nbsp;·&nbsp; Solo para visitantes</div>

<script>
  const API_URL = 'https://script.google.com/macros/s/AKfycbymirtM9Qfba_p5xlgR8TLh2HW_3LbgxJyIZTsq-DYqzTuqUZJy-foK6Zs0NS1RCeJ_/exec';

  function copyPassword() {
    const pwd = document.getElementById('pwd-text').textContent;
    const btn = document.getElementById('btn-copy');
    const lbl = document.getElementById('copy-label');
    navigator.clipboard.writeText(pwd).then(() => {
      btn.classList.add('copied');
      lbl.textContent = '¡Copiada!';
      setTimeout(() => { btn.classList.remove('copied'); lbl.textContent = 'Copiar contraseña'; }, 2500);
    }).catch(() => { lbl.textContent = 'Copia manualmente: Catosa2025'; });
  }

  async function handleConnect() {
    const nombre  = document.getElementById('nombre').value.trim();
    const empresa = document.getElementById('empresa').value.trim();
    const errorEl = document.getElementById('error-msg');
    errorEl.style.display = 'none';
    if (!nombre || !empresa) {
      errorEl.textContent = 'Por favor ingresa tu nombre y empresa para continuar.';
      errorEl.style.display = 'block';
      return;
    }
    setLoading(true);
    try {
      await fetch(API_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nombre, empresa, fecha: new Date().toISOString(), userAgent: navigator.userAgent })
      });
      showSuccess();
    } catch (err) {
      document.getElementById('error-msg').textContent = 'Error al registrar. Intenta de nuevo.';
      document.getElementById('error-msg').style.display = 'block';
      setLoading(false);
    }
  }

  function setLoading(on) {
    document.getElementById('btn-connect').disabled = on;
    document.getElementById('spinner').style.display = on ? 'block' : 'none';
    document.getElementById('btn-icon').style.display = on ? 'none' : 'block';
    document.getElementById('btn-text').textContent = on ? 'Conectando...' : 'Conectarme al WiFi';
  }

  function showSuccess() {
    document.getElementById('state-form').classList.remove('active');
    document.getElementById('state-success').classList.add('active');
  }

  document.querySelectorAll('input').forEach(el => {
    el.addEventListener('keydown', e => { if (e.key === 'Enter') handleConnect(); });
  });
</script>
